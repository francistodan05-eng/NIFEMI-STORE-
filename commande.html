<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commander - NIFEMI STORE</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --primary: #1a2c3e; --accent: #b87c4f; --accent-dark: #9b623d; --white: #faf9f8; --gray-light: #f5f3f0; --gray: #6c757d; --shadow: 0 10px 30px rgba(0,0,0,0.05); --shadow-hover: 0 20px 40px rgba(0,0,0,0.1); --transition: all 0.3s ease; }
    body { font-family: 'Inter', sans-serif; background: var(--white); }
    .container { width: 90%; max-width: 1280px; margin: 0 auto; }
    
    .header { position: fixed; top: 0; width: 100%; background: var(--white); padding: 20px 0; z-index: 1000; box-shadow: var(--shadow); transition: var(--transition); }
    .header-scrolled { padding: 12px 0; }
    .header-inner { display: flex; justify-content: space-between; align-items: center; }
    .logo-classic { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .logo-badge { background: var(--primary); width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: baseline; justify-content: center; gap: 2px; padding-top: 12px; }
    .big-n { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 800; color: var(--accent); }
    .small-s { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; color: var(--accent); align-self: flex-end; margin-bottom: 4px; }
    .logo-text { display: flex; flex-direction: column; }
    .brand-name { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--primary); }
    .brand-store { font-size: 9px; font-weight: 600; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
    
    .menu-toggle { display: block; cursor: pointer; z-index: 1001; }
    .menu-toggle span { display: block; width: 28px; height: 2px; background: var(--primary); margin: 6px 0; transition: var(--transition); }
    .menu-toggle.active span:nth-child(1) { transform: rotate(45deg) translate(6px, 6px); }
    .menu-toggle.active span:nth-child(2) { opacity: 0; }
    .menu-toggle.active span:nth-child(3) { transform: rotate(-45deg) translate(8px, -8px); }
    
    .nav-menu { position: fixed; top: 0; right: -100%; width: 80%; max-width: 350px; height: 100vh; background: var(--white); padding: 100px 40px; transition: 0.4s ease; z-index: 999; box-shadow: -5px 0 30px rgba(0,0,0,0.1); }
    .nav-menu.active { right: 0; }
    .nav-list { list-style: none; }
    .nav-list li { margin-bottom: 30px; }
    .nav-link { text-decoration: none; color: var(--primary); font-size: 22px; font-weight: 500; transition: var(--transition); display: inline-block; }
    .nav-link:hover { color: var(--accent); transform: translateX(8px); }
    .nav-commande { background: var(--accent); color: white !important; padding: 12px 28px; border-radius: 40px; }
    
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 998; opacity: 0; visibility: hidden; transition: 0.3s; }
    .overlay.active { opacity: 1; visibility: visible; }
    
    .cart-float { position: fixed; bottom: 30px; right: 30px; z-index: 1000; }
    .cart-icon { display: flex; align-items: center; justify-content: center; width: 60px; height: 60px; background: var(--accent); border-radius: 50%; box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-decoration: none; position: relative; }
    .cart-icon i { font-size: 28px; color: white; }
    .cart-badge { position: absolute; top: -5px; right: -5px; background: #2196F3; color: white; font-size: 12px; font-weight: bold; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    
    .page-commande { padding: 120px 0 60px; }
    .commande-container { max-width: 900px; margin: 0 auto; background: white; border-radius: 30px; padding: 40px; box-shadow: var(--shadow); }
    .commande-container h1 { font-family: 'Playfair Display', serif; font-size: 36px; text-align: center; color: var(--primary); margin-bottom: 10px; }
    
    .recap-panier { background: var(--gray-light); border-radius: 20px; padding: 20px; margin-bottom: 30px; }
    .recap-panier h3 { font-size: 20px; color: var(--primary); margin-bottom: 15px; }
    .recap-item { display: flex; gap: 15px; padding: 10px 0; border-bottom: 1px solid var(--gray); align-items: center; }
    .recap-item img { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; }
    .recap-item-info { flex: 1; }
    .recap-item-info h4 { font-size: 14px; color: var(--primary); }
    .recap-item-info p { font-size: 12px; color: var(--gray); }
    .recap-item-quantite { font-weight: 600; color: var(--accent); }
    .panier-vide { text-align: center; padding: 30px; }
    .panier-vide a { color: var(--accent); text-decoration: none; }
    
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--primary); }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 14px; border: 2px solid var(--gray-light); border-radius: 15px; font-size: 16px; font-family: 'Inter', sans-serif; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .btn-submit { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; transition: var(--transition); }
    .btn-submit:hover { background: var(--accent-dark); transform: scale(1.02); }
    
    .footer { background: var(--primary); color: var(--white); padding: 60px 0 30px; margin-top: 60px; }
    .footer-content { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 30px; padding-bottom: 40px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 30px; }
    .footer-logo h3 { font-family: 'Playfair Display', serif; font-size: 28px; margin-bottom: 8px; }
    .footer-logo p { opacity: 0.7; font-size: 14px; }
    .footer-links { display: flex; gap: 30px; flex-wrap: wrap; }
    .footer-links a { color: var(--white); text-decoration: none; opacity: 0.7; transition: var(--transition); }
    .footer-links a:hover { opacity: 1; color: var(--accent); }
    .footer-credits { text-align: center; font-size: 14px; opacity: 0.7; }
    .developer-tag { font-style: italic; font-size: 12px; opacity: 0.6; }
    
    @media (min-width: 992px) { .menu-toggle { display: none; } .nav-menu { position: static; width: auto; height: auto; background: transparent; padding: 0; box-shadow: none; } .nav-list { display: flex; gap: 40px; align-items: center; } .nav-list li { margin-bottom: 0; } .nav-link { font-size: 16px; } .nav-commande { padding: 10px 24px; } }
    @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; gap: 0; } .commande-container { padding: 25px; margin: 0 20px; } .recap-item { flex-wrap: wrap; text-align: center; justify-content: center; } .footer-content { flex-direction: column; text-align: center; } .footer-links { justify-content: center; } }
  </style>
</head>
<body>

<header class="header">
  <div class="container">
    <div class="header-inner">
      <a href="index.html" class="logo-classic">
        <div class="logo-badge"><span class="big-n">N</span><span class="small-s">s</span></div>
        <div class="logo-text"><span class="brand-name">NIFEMI</span><span class="brand-store">STORE</span></div>
      </a>

      <div class="menu-toggle" id="menuToggle">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <nav class="nav-menu" id="navMenu">
        <ul class="nav-list">
          <li><a href="index.html" class="nav-link">Accueil</a></li>
          <li><a href="index.html#produits" class="nav-link">Produits</a></li>
          <li><a href="index.html#contact" class="nav-link">Contact</a></li>
        </ul>
      </nav>
    </div>
  </div>
</header>

<main class="page-commande">
  <div class="commande-container">
    <h1>📋 Finaliser votre commande</h1>

    <div id="recapPanier" class="recap-panier">
      <p style="text-align:center;">Chargement du panier...</p>
    </div>

    <!-- Formulaire avec Netlify Forms -->
    <form name="commande" method="POST" data-netlify="true" netlify-honeypot="bot-field">
      <input type="hidden" name="form-name" value="commande">
      
      <!-- Champ anti-spam caché -->
      <p style="display:none;">
        <label>Ne pas remplir : <input name="bot-field"></label>
      </p>

      <!-- Champ caché pour l'email de destination (configurable) -->
      <input type="hidden" name="_to" value="mouchfikothsofiano@gmail.com">

      <div class="form-row">
        <div class="form-group">
          <label>Prénom *</label>
          <input type="text" name="prenom" id="prenom" required placeholder="Votre prénom">
        </div>
        <div class="form-group">
          <label>Nom *</label>
          <input type="text" name="nom" id="nom" required placeholder="Votre nom">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Téléphone *</label>
          <input type="tel" name="telephone" id="telephone" required placeholder="+229 XX XX XX XX">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" id="email" placeholder="votre@email.com">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Pays *</label>
          <select name="pays" id="pays">
            <option>Bénin</option>
            <option>Togo</option>
            <option>Côte d'Ivoire</option>
            <option>Sénégal</option>
            <option>Autre</option>
          </select>
        </div>
        <div class="form-group">
          <label>Ville *</label>
          <input type="text" name="ville" id="ville" required placeholder="Cotonou, Porto-Novo...">
        </div>
      </div>

      <div class="form-group">
        <label>Adresse de livraison *</label>
        <textarea name="adresse" id="adresse" rows="2" required placeholder="Votre adresse complète (quartier, rue, porte...)"></textarea>
      </div>

      <!-- Champ caché pour le panier (sera rempli par JavaScript) -->
      <input type="hidden" name="panier" id="panierHidden">

      <button type="submit" class="btn-submit">📧 Envoyer la commande</button>
    </form>
  </div>
</main>

<div class="cart-float"><a href="panier.html" class="cart-icon"><i class="fas fa-shopping-cart"></i><span class="cart-badge" id="cartBadge">0</span></a></div>

<footer class="footer">
  <div class="container">
    <div class="footer-content">
      <div class="footer-logo"><h3>NIFEMI STORE</h3><p>L'élégance à portée de main</p></div>
      <div class="footer-links"><a href="index.html">Accueil</a><a href="index.html#produits">Produits</a><a href="index.html#contact">Contact</a>
    </div>
    <div class="footer-credits"><p>&copy; 2026 NIFEMI STORE. Tous droits réservés.</p><p>Conçu par <strong>Carlos TODAN</strong> <span class="developer-tag">(Développeur web)</span></p></div>
  </div>
</footer>

<script>
  // ================= MENU BURGER =================
  const menuToggle = document.getElementById('menuToggle');
  const navMenu = document.getElementById('navMenu');
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  document.body.appendChild(overlay);

  if (menuToggle && navMenu) {
    menuToggle.addEventListener('click', function() {
      this.classList.toggle('active');
      navMenu.classList.toggle('active');
      overlay.classList.toggle('active');
      document.body.style.overflow = navMenu.classList.contains('active') ? 'hidden' : '';
    });

    overlay.addEventListener('click', function() {
      menuToggle.classList.remove('active');
      navMenu.classList.remove('active');
      overlay.classList.remove('active');
      document.body.style.overflow = '';
    });

    document.querySelectorAll('.nav-link').forEach(link => {
      link.addEventListener('click', function() {
        menuToggle.classList.remove('active');
        navMenu.classList.remove('active');
        overlay.classList.remove('active');
        document.body.style.overflow = '';
      });
    });
  }

  // ================= HEADER SCROLL =================
  window.addEventListener('scroll', function() {
    const header = document.querySelector('.header');
    if (window.scrollY > 50) header.classList.add('header-scrolled');
    else header.classList.remove('header-scrolled');
  });

  // ================= GESTION PANIER =================
  let cart = JSON.parse(localStorage.getItem('cart')) || [];

  function updateCartBadge() {
    const total = cart.reduce((sum, item) => sum + item.quantity, 0);
    const badge = document.getElementById('cartBadge');
    if (badge) badge.textContent = total;
  }

  function displayRecap() {
    const recapDiv = document.getElementById('recapPanier');
    
    if (cart.length === 0) {
      recapDiv.innerHTML = `<div class="panier-vide"><p>🛍️ Votre panier est vide.</p><a href="index.html#produits">Retour aux produits</a></div>`;
      document.getElementById('panierHidden').value = '';
      return;
    }

    let html = `<h3>🛍️ Votre panier</h3>`;
    let panierText = '';

    cart.forEach(item => {
      const prix = typeof item.price === 'number' ? item.price : 0;
      const prixAffichage = prix > 0 ? `${prix.toLocaleString()} FCFA` : 'Prix sur demande';
      
      html += `
        <div class="recap-item">
          <img src="${item.image || 'images/placeholder.png'}" onerror="this.src='images/placeholder.png'">
          <div class="recap-item-info">
            <h4>${item.name}</h4>
            <p>Couleur: ${item.color || 'Standard'} | ${prixAffichage}</p>
          </div>
          <div class="recap-item-quantite">x${item.quantity}</div>
        </div>
      `;
      
      panierText += `${item.name} (${item.color || 'Standard'}) x${item.quantity}, `;
    });

    recapDiv.innerHTML = html;
    document.getElementById('panierHidden').value = panierText;
  }

  // Initialisation
  displayRecap();
  updateCartBadge();
</script>

</body>
</html>
