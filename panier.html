<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon Panier - NIFEMI STORE</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --primary: #1a2c3e; --accent: #b87c4f; --accent-dark: #9b623d; --white: #faf9f8; --gray-light: #f5f3f0; --gray: #6c757d; --shadow: 0 10px 30px rgba(0,0,0,0.05); --transition: all 0.3s ease; }
    body { font-family: 'Inter', sans-serif; background: var(--white); }
    .container { width: 90%; max-width: 1280px; margin: 0 auto; }
    
    .header { position: fixed; top: 0; width: 100%; background: var(--white); padding: 20px 0; z-index: 1000; box-shadow: var(--shadow); transition: var(--transition); }
    .header-scrolled { padding: 12px 0; }
    .header-inner { display: flex; justify-content: space-between; align-items: center; }
    .logo-classic { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .logo-badge { background: var(--primary); width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: baseline; justify-content: center; gap: 2px; padding-top: 12px; }
    .big-n { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 800; color: var(--accent); }
    .small-s { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; color: var(--accent); align-self: flex-end; margin-bottom: 4px; }
    .logo-text { display: flex; flex-direction: column; }
    .brand-name { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--primary); }
    .brand-store { font-size: 9px; font-weight: 600; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
    
    .menu-toggle { display: block; cursor: pointer; z-index: 1001; }
    .menu-toggle span { display: block; width: 28px; height: 2px; background: var(--primary); margin: 6px 0; transition: var(--transition); }
    .menu-toggle.active span:nth-child(1) { transform: rotate(45deg) translate(6px, 6px); }
    .menu-toggle.active span:nth-child(2) { opacity: 0; }
    .menu-toggle.active span:nth-child(3) { transform: rotate(-45deg) translate(8px, -8px); }
    
    .nav-menu { position: fixed; top: 0; right: -100%; width: 80%; max-width: 350px; height: 100vh; background: var(--white); padding: 100px 40px; transition: 0.4s ease; z-index: 999; box-shadow: -5px 0 30px rgba(0,0,0,0.1); }
    .nav-menu.active { right: 0; }
    .nav-list { list-style: none; }
    .nav-list li { margin-bottom: 30px; }
    .nav-link { text-decoration: none; color: var(--primary); font-size: 22px; font-weight: 500; transition: var(--transition); display: inline-block; }
    .nav-link:hover { color: var(--accent); transform: translateX(8px); }
    .nav-commande { background: var(--accent); color: white !important; padding: 12px 28px; border-radius: 40px; }
    
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 998; opacity: 0; visibility: hidden; transition: 0.3s; }
    .overlay.active { opacity: 1; visibility: visible; }
    
    .cart-float { position: fixed; bottom: 30px; right: 30px; z-index: 1000; }
    .cart-icon { display: flex; align-items: center; justify-content: center; width: 60px; height: 60px; background: var(--accent); border-radius: 50%; box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-decoration: none; position: relative; }
    .cart-icon i { font-size: 28px; color: white; }
    .cart-badge { position: absolute; top: -5px; right: -5px; background: #2196F3; color: white; font-size: 12px; font-weight: bold; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    
    .page-panier { padding: 120px 0 60px; min-height: 100vh; }
    .page-panier h1 { font-family: 'Playfair Display', serif; font-size: 42px; color: var(--primary); margin-bottom: 40px; text-align: center; }
    
    .panier-vide { text-align: center; padding: 60px; background: var(--gray-light); border-radius: 20px; }
    .panier-vide p { font-size: 18px; color: var(--gray); margin-bottom: 20px; }
    .btn-continuer { display: inline-block; background: var(--accent); color: white; padding: 12px 30px; border-radius: 50px; text-decoration: none; font-weight: 600; transition: var(--transition); }
    .btn-continuer:hover { background: var(--accent-dark); transform: translateY(-2px); }
    
    .panier-table { background: white; border-radius: 20px; overflow: hidden; box-shadow: var(--shadow); margin-bottom: 30px; }
    .panier-header { display: grid; grid-template-columns: 80px 2fr 1fr 1fr 1fr 50px; background: var(--primary); color: white; padding: 15px 20px; font-weight: 600; }
    .panier-item { display: grid; grid-template-columns: 80px 2fr 1fr 1fr 1fr 50px; padding: 20px; border-bottom: 1px solid var(--gray-light); align-items: center; }
    .item-image img { width: 60px; height: 60px; object-fit: cover; border-radius: 10px; }
    .item-info h3 { font-size: 16px; color: var(--primary); margin-bottom: 5px; }
    .item-info p { font-size: 12px; color: var(--gray); }
    .item-prix, .item-total { font-weight: 600; color: var(--accent); }
    .item-quantite input { width: 60px; padding: 8px; border: 2px solid var(--gray-light); border-radius: 10px; text-align: center; font-size: 14px; }
    .item-supprimer button { background: none; border: none; color: #ff6b6b; font-size: 18px; cursor: pointer; transition: var(--transition); }
    .item-supprimer button:hover { color: #ff4757; transform: scale(1.1); }
    
    .panier-total { background: var(--gray-light); padding: 20px; border-radius: 20px; display: flex; justify-content: flex-end; margin-bottom: 30px; }
    .panier-total h3 { font-size: 24px; color: var(--primary); }
    .panier-total span { font-size: 28px; font-weight: 700; color: var(--accent); margin-left: 20px; }
    
    .panier-actions { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-bottom: 30px; }
    .btn-whatsapp-panier { background: #25D366; color: white; padding: 16px 35px; border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 18px; transition: var(--transition); display: inline-flex; align-items: center; gap: 10px; border: none; cursor: pointer; }
    .btn-whatsapp-panier:hover { background: #128C7E; transform: translateY(-2px); }
    .btn-email-panier { background: var(--accent); color: white; padding: 16px 35px; border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 18px; transition: var(--transition); display: inline-flex; align-items: center; gap: 10px; border: none; cursor: pointer; }
    .btn-email-panier:hover { background: var(--accent-dark); transform: translateY(-2px); }
    
    .footer { background: var(--primary); color: var(--white); padding: 60px 0 30px; margin-top: 60px; }
    .footer-content { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 30px; padding-bottom: 40px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 30px; }
    .footer-logo h3 { font-family: 'Playfair Display', serif; font-size: 28px; margin-bottom: 8px; }
    .footer-logo p { opacity: 0.7; font-size: 14px; }
    .footer-links { display: flex; gap: 30px; flex-wrap: wrap; }
    .footer-links a { color: var(--white); text-decoration: none; opacity: 0.7; transition: var(--transition); }
    .footer-links a:hover { opacity: 1; color: var(--accent); }
    .footer-credits { text-align: center; font-size: 14px; opacity: 0.7; }
    .developer-tag { font-style: italic; font-size: 12px; opacity: 0.6; }
    
    @media (min-width: 992px) { .menu-toggle { display: none; } .nav-menu { position: static; width: auto; height: auto; background: transparent; padding: 0; box-shadow: none; } .nav-list { display: flex; gap: 40px; align-items: center; } .nav-list li { margin-bottom: 0; } .nav-link { font-size: 16px; } .nav-commande { padding: 10px 24px; } }
    @media (max-width: 992px) { .panier-header { display: none; } .panier-item { grid-template-columns: 1fr; gap: 15px; text-align: center; } .item-image img { margin: 0 auto; } .item-quantite input { margin: 0 auto; } .panier-total { justify-content: center; } .panier-actions { flex-direction: column; align-items: center; } }
  </style>
</head>
<body>

<header class="header">
  <div class="container">
    <div class="header-inner">
      <a href="index.html" class="logo-classic">
        <div class="logo-badge"><span class="big-n">N</span><span class="small-s">s</span></div>
        <div class="logo-text"><span class="brand-name">NIFEMI</span><span class="brand-store">STORE</span></div>
      </a>

      <div class="menu-toggle" id="menuToggle">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <nav class="nav-menu" id="navMenu">
        <ul class="nav-list">
          <li><a href="index.html" class="nav-link">Accueil</a></li>
          <li><a href="index.html#produits" class="nav-link">Produits</a></li>
          <li><a href="index.html#contact" class="nav-link">Contact</a></li>
        </ul>
      </nav>
    </div>
  </div>
</header>

<main class="page-panier">
  <div class="container">
    <h1>🛒 Mon Panier</h1>
    <div id="panierContenu"></div>
  </div>
</main>

<div class="cart-float"><a href="panier.html" class="cart-icon"><i class="fas fa-shopping-cart"></i><span class="cart-badge" id="cartBadge">0</span></a></div>

<footer class="footer">
  <div class="container">
    <div class="footer-content">
      <div class="footer-logo"><h3>NIFEMI STORE</h3><p>L'élégance à portée de main</p></div>
      <div class="footer-links"><a href="index.html">Accueil</a><a href="index.html#produits">Produits</a><a href="index.html#contact">Contact</a>
    </div>
    <div class="footer-credits"><p>&copy; 2026 NIFEMI STORE. Tous droits réservés.</p><p>Conçu par <strong>Carlos TODAN</strong> <span class="developer-tag">(Développeur web)</span></p></div>
  </div>
</footer>

<script>
  // ================= MENU BURGER =================
  const menuToggle = document.getElementById('menuToggle');
  const navMenu = document.getElementById('navMenu');
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  document.body.appendChild(overlay);

  if (menuToggle && navMenu) {
    menuToggle.addEventListener('click', function() {
      this.classList.toggle('active');
      navMenu.classList.toggle('active');
      overlay.classList.toggle('active');
      document.body.style.overflow = navMenu.classList.contains('active') ? 'hidden' : '';
    });

    overlay.addEventListener('click', function() {
      menuToggle.classList.remove('active');
      navMenu.classList.remove('active');
      overlay.classList.remove('active');
      document.body.style.overflow = '';
    });

    document.querySelectorAll('.nav-link').forEach(link => {
      link.addEventListener('click', function() {
        menuToggle.classList.remove('active');
        navMenu.classList.remove('active');
        overlay.classList.remove('active');
        document.body.style.overflow = '';
      });
    });
  }

  // ================= HEADER SCROLL =================
  window.addEventListener('scroll', function() {
    const header = document.querySelector('.header');
    if (window.scrollY > 50) header.classList.add('header-scrolled');
    else header.classList.remove('header-scrolled');
  });

  // ================= GESTION PANIER =================
  let cart = JSON.parse(localStorage.getItem('cart')) || [];

  function updateCartBadge() {
    const total = cart.reduce((s, i) => s + i.quantity, 0);
    const badge = document.getElementById('cartBadge');
    if (badge) badge.textContent = total;
  }

  function saveCart() {
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartBadge();
    displayCart();
  }

  function removeFromCart(index) {
    cart.splice(index, 1);
    saveCart();
  }

  function updateQuantity(index, newQuantity) {
    if (newQuantity <= 0) {
      removeFromCart(index);
    } else {
      cart[index].quantity = newQuantity;
      saveCart();
    }
  }

  function generateWhatsAppMessage() {
    let message = "📦 *NOUVELLE COMMANDE NIFEMI STORE* 📦\n\n";
    let totalGeneral = 0;
    cart.forEach(item => {
      const prix = typeof item.price === 'number' ? item.price : 0;
      const totalItem = prix * item.quantity;
      totalGeneral += totalItem;
      message += `*${item.name}*\n`;
      message += `Couleur: ${item.color || 'Standard'}\n`;
      message += `Quantité: ${item.quantity}\n`;
      if (prix > 0) message += `Prix unitaire: ${prix.toLocaleString()} FCFA\n`;
      message += `Sous-total: ${totalItem > 0 ? totalItem.toLocaleString() + ' FCFA' : 'Prix sur demande'}\n\n`;
    });
    message += `*Total général: ${totalGeneral > 0 ? totalGeneral.toLocaleString() + ' FCFA' : 'Prix sur demande'}*\n\n`;
    message += `Merci de confirmer ma commande.`;
    return message;
  }

  function redirectToWhatsApp() {
    const message = generateWhatsAppMessage();
    window.open(`https://wa.me/2290151354446?text=${encodeURIComponent(message)}`, '_blank');
  }

  function redirectToEmail() {
    window.location.href = 'commande.html';
  }

  function displayCart() {
    const container = document.getElementById('panierContenu');
    if (cart.length === 0) {
      container.innerHTML = `<div class="panier-vide"><p>🛍️ Votre panier est vide</p><a href="index.html#produits" class="btn-continuer">Continuer mes achats</a></div>`;
      return;
    }
    let totalGeneral = 0;
    let itemsHtml = `<div class="panier-table"><div class="panier-header"><div>Image</div><div>Produit</div><div>Prix unitaire</div><div>Quantité</div><div>Total</div><div></div></div>`;
    cart.forEach((item, index) => {
      const prix = typeof item.price === 'number' ? item.price : 0;
      const totalItem = prix * item.quantity;
      totalGeneral += totalItem;
      const prixAffichage = prix > 0 ? `${prix.toLocaleString()} FCFA` : 'Prix sur demande';
      const totalAffichage = totalItem > 0 ? `${totalItem.toLocaleString()} FCFA` : 'Prix sur demande';
      itemsHtml += `
        <div class="panier-item">
          <div class="item-image"><img src="${item.image || 'images/placeholder.png'}" onerror="this.src='images/placeholder.png'"></div>
          <div class="item-info"><h3>${item.name}</h3><p>Couleur: ${item.color || 'Standard'}</p></div>
          <div class="item-prix">${prixAffichage}</div>
          <div class="item-quantite"><input type="number" value="${item.quantity}" min="1" onchange="updateQuantity(${index}, parseInt(this.value))"></div>
          <div class="item-total">${totalAffichage}</div>
          <div class="item-supprimer"><button onclick="removeFromCart(${index})"><i class="fas fa-trash"></i></button></div>
        </div>`;
    });
    itemsHtml += `</div>`;
    const totalAffichageGeneral = totalGeneral > 0 ? `${totalGeneral.toLocaleString()} FCFA` : 'Prix sur demande';
    itemsHtml += `
      <div class="panier-total"><h3>Total général : <span>${totalAffichageGeneral}</span></h3></div>
      <div class="panier-actions">
        <button class="btn-whatsapp-panier" onclick="redirectToWhatsApp()"><i class="fab fa-whatsapp"></i> Commander sur WhatsApp</button>
        <button class="btn-email-panier" onclick="redirectToEmail()"><i class="fas fa-envelope"></i> Commander par email</button>
      </div>`;
    container.innerHTML = itemsHtml;
  }

  displayCart();
  updateCartBadge();
</script>

</body>
</html>
